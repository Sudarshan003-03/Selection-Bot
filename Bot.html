    <style>
        :root {
            --tata-blue: #1a3a5c;

            --tata-dark: #0d1f33;
            --accent: #e74c3c;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8ecf1 0%, #d1d8e0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .chat-container {
            max-width: 900px;
            width: 100%;
            background: linear-gradient(135deg, var(--tata-dark) 0%, var(--tata-blue) 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            height: 700px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            background: linear-gradient(90deg, var(--tata-dark), var(--tata-blue));
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 3px solid var(--tata-gold);
        }
        
        .logo-circle {
            width: 50px;
            height: 50px;
            background: var(--tata-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
            color: var(--tata-dark);
            flex-shrink: 0;
        }
        
        .header-text h1 {
            color: white;
            font-size: 20px;
            margin: 0;
            font-weight: 700;
        }
        
        .header-text p {
            color: #a0b4c8;
            font-size: 13px;
            margin: 4px 0 0;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: #eef2f7;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .bot-message {
            background: white;
            color: #2c3e50;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        .user-message {
            background: linear-gradient(135deg, var(--tata-blue), var(--tata-dark));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .option-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-top: 12px;
        }
        
        .option-btn {
            padding: 12px 16px;
            border: 2px solid var(--tata-blue);
            background: white;
            color: var(--tata-blue);
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            text-align: center;
            font-family: inherit;
        }
        
        .option-btn:hover {
            background: var(--tata-blue);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26,58,92,0.3);
        }
        
        .option-btn.selected {
            background: var(--tata-gold);
            border-color: var(--tata-gold);
            color: var(--tata-dark);
        }
        
        .option-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .results-table th {
            background: var(--tata-blue);
            color: white;
            padding: 12px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .results-table td {
            padding: 10px;
            border-bottom: 1px solid #eef2f7;
            color: #444;
        }
        
        .results-table tr:hover td {
            background: #f8fafc;
        }
        
        .price-tag {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            display: inline-block;
        }
        
        .part-badge {
            background: #e8f4fd;
            color: var(--tata-blue);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 15px 20px;
            align-self: flex-start;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--tata-blue);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .reset-btn {
            margin-top: 15px;
            padding: 10px 24px;
            background: var(--tata-gold);
            color: var(--tata-dark);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .reset-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(201,162,39,0.4);
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 15px 25px;
            background: white;
            border-top: 1px solid #e0e6ed;
            font-size: 12px;
            color: #666;
            flex-wrap: wrap;
        }
        
        .stats-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stats-bar strong {
            color: var(--tata-blue);
        }
        
        /* Scrollbar styling */

            width: 8px;
        }

            background: #eef2f7;
        }

            background: #c1c9d6;
            border-radius: 4px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }
    </style>
</head>

// CHATBOT LOGIC
// ============================================

// Extract unique values from dataset
const vehicleTypes = [...new Set(partsData.map(p => p.Vehicle_Type))].sort();
const bsStandards = [...new Set(partsData.map(p => p.BS_Standard))].sort();
const partNames = [...new Set(partsData.map(p => p.Part_Name))].sort();
const categories = [...new Set(partsData.map(p => p.Category))].sort();

// Chat state management
let chatState = {
    step: 'welcome',
    selectedVehicleType: null,
    selectedBS: null,
    selectedPart: null
};

const chatMessages = document.getElementById('chatMessages');

// Utility: Scroll to bottom of chat
function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Add bot message to chat
function addBotMessage(html, hasOptions = false) {
    const div = document.createElement('div');
    div.className = 'message bot-message';
    div.innerHTML = html;
    chatMessages.appendChild(div);
    scrollToBottom();
    return div;
}

// Add user message to chat
function addUserMessage(text) {
    const div = document.createElement('div');
    div.className = 'message user-message';
    div.textContent = text;
    chatMessages.appendChild(div);
    scrollToBottom();
}

// Show typing indicator
function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatMessages.appendChild(div);
    scrollToBottom();
    return div;
}

// Remove typing indicator
function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
}

// Create option buttons grid
function createOptions(options, callback) {
    const grid = document.createElement('div');
    grid.className = 'option-grid';
    
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => {
            // Disable all buttons after selection
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            btn.classList.add('selected');
            callback(opt);
        };
        grid.appendChild(btn);
    });
    
    return grid;
}

// Display results table
function showResults(parts) {
    if (parts.length === 0) {
        addBotMessage('❌ No parts found matching your criteria. Please try different filters.');
        addResetButton();
        return;
    }
    
    let tableHTML = `<div style="margin-bottom:10px;font-weight:700;color:var(--tata-blue);">🔍 Found ${parts.length} part(s) matching your criteria:</div>`;
    tableHTML += `<div style="overflow-x:auto;"><table class="results-table">
        <thead><tr>
            <th>Part ID</th>
            <th>Part Name</th>
            <th>Vehicle Model</th>
            <th>Material</th>
            <th>Price (₹)</th>
            <th>Warranty</th>
        </tr></thead><tbody>`;
    
    parts.forEach(p => {
        tableHTML += `<tr>
            <td><strong>${p.Part_ID}</strong></td>
            <td><span class="part-badge">${p.Part_Name}</span></td>
            <td>${p.Vehicle_Model}</td>
            <td>${p.Material}</td>
            <td><span class="price-tag">₹${p.Selling_Price.toLocaleString()}</span></td>
            <td>${p.Warranty}</td>
        </tr>`;
    });
    
    tableHTML += '</tbody></table></div>';
    addBotMessage(tableHTML);
    addResetButton();
}

// Add reset/new search button
function addResetButton() {
    const btn = document.createElement('button');
    btn.className = 'reset-btn';
    btn.textContent = '🔄 Start New Search';
    btn.onclick = () => {
        chatState = { step: 'welcome', selectedVehicleType: null, selectedBS: null, selectedPart: null };
        chatMessages.innerHTML = '';
        startChat();
    };
    
    const msg = document.createElement('div');
    msg.className = 'message bot-message';
    msg.appendChild(btn);
    chatMessages.appendChild(msg);
    scrollToBottom();
}

// ============================================
// CHAT FLOW
// ============================================

// Step 1: Welcome + Vehicle Type Selection
function startChat() {
    addBotMessage(`👋 <strong>Welcome to Tata Motors Commercial Vehicle Spare Parts!</strong><br><br>How can I help you today? I can assist you in finding genuine spare parts with pricing, warranty, and compatibility details.<br><br>Let's start by selecting your <strong>Vehicle Type</strong>:`);
    
    const optionsDiv = createOptions(vehicleTypes, (selected) => {
        chatState.selectedVehicleType = selected;
        addUserMessage(selected);
        
        showTyping();
        setTimeout(() => {
            removeTyping();
            askBSStandard();
        }, 800);
    });
    
    const msg = document.createElement('div');
    msg.className = 'message bot-message';
    msg.appendChild(optionsDiv);
    chatMessages.appendChild(msg);
    scrollToBottom();
}

// Step 2: BS Standard Selection
function askBSStandard() {
    addBotMessage(`✅ Great! You selected <strong>${chatState.selectedVehicleType}</strong>.<br><br>Now, please select the <strong>BS Emission Standard</strong> for your vehicle:`);
    
    const optionsDiv = createOptions(bsStandards, (selected) => {
        chatState.selectedBS = selected;
        addUserMessage(selected);
        
        showTyping();
        setTimeout(() => {
            removeTyping();
            askPartName();
        }, 800);
    });
    
    const msg = document.createElement('div');
    msg.className = 'message bot-message';
    msg.appendChild(optionsDiv);
    chatMessages.appendChild(msg);
    scrollToBottom();
}

// Step 3: Part Name Selection (filtered by previous choices)
function askPartName() {
    // Filter parts by vehicle type and BS standard
    const relevantParts = partsData.filter(p => 
        p.Vehicle_Type === chatState.selectedVehicleType && 
        p.BS_Standard === chatState.selectedBS
    );
    
    const relevantPartNames = [...new Set(relevantParts.map(p => p.Part_Name))].sort();
    
    if (relevantPartNames.length === 0) {
        addBotMessage(`❌ Sorry, no parts are available for <strong>${chatState.selectedVehicleType}</strong> with <strong>${chatState.selectedBS}</strong> standard in our current catalog.<br><br>Would you like to try a different combination?`);
        addResetButton();
        return;
    }
    
    addBotMessage(`✅ Perfect! <strong>${chatState.selectedVehicleType}</strong> with <strong>${chatState.selectedBS}</strong> standard.<br><br>Now, please select the <strong>Part Name</strong> you are looking for:`);
    
    const optionsDiv = createOptions(relevantPartNames, (selected) => {
        chatState.selectedPart = selected;
        addUserMessage(selected);
        
        showTyping();
        setTimeout(() => {
            removeTyping();
            showFinalResults();
        }, 1000);
    });
    
    const msg = document.createElement('div');
    msg.className = 'message bot-message';
    msg.appendChild(optionsDiv);
    chatMessages.appendChild(msg);
    scrollToBottom();
}

// Step 4: Show Final Results
function showFinalResults() {
    const results = partsData.filter(p => 
        p.Vehicle_Type === chatState.selectedVehicleType && 
        p.BS_Standard === chatState.selectedBS && 
        p.Part_Name === chatState.selectedPart
    );
    
    addBotMessage(`🎯 <strong>Here are the details for your selection:</strong><br>
    Vehicle Type: <strong>${chatState.selectedVehicleType}</strong><br>
    BS Standard: <strong>${chatState.selectedBS}</strong><br>
    Part Name: <strong>${chatState.selectedPart}</strong>`);
    
    showResults(results);
}

// ============================================
// INITIALIZE CHATBOT
// ============================================
startChat();
</script>
